name: ClaudeUsage

options:
  bundleIdPrefix: com.claudeusage
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    # Supplied at generate time by scripts/configure.sh (via the DEVELOPMENT_TEAM env var). If you
    # run `xcodegen generate` directly, this is empty — just pick your team in each target's
    # Signing & Capabilities tab in Xcode.
    DEVELOPMENT_TEAM: "${DEVELOPMENT_TEAM}"
    ENABLE_HARDENED_RUNTIME: NO

targets:
  # Background agent app (no Dock icon) — reads Keychain, fetches usage, writes the shared
  # snapshot file, reloads the widget. Non-sandboxed. Embeds the widget extension.
  ClaudeUsage:
    type: application
    platform: macOS
    sources:
      - path: Shared
      - path: SharedUI
      - path: ClaudeUsageApp
    dependencies:
      - target: ClaudeUsageWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudeusage.app
        # Non-sandboxed (no entitlements) so it can read Claude Code's Keychain item.
    info:
      path: ClaudeUsageApp/Info.plist
      properties:
        LSUIElement: true            # agent app: menu bar only, no Dock icon
        CFBundleDisplayName: Claude Usage
        NSHumanReadableCopyright: ""

  # WidgetKit extension — sandboxed; renders the shared snapshot in Notification Center / desktop.
  ClaudeUsageWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: Shared
      - path: SharedUI
      - path: ClaudeUsageWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudeusage.app.ClaudeUsageWidget
        CODE_SIGN_ENTITLEMENTS: ClaudeUsageWidget/ClaudeUsageWidget.entitlements
    info:
      path: ClaudeUsageWidget/Info.plist
      properties:
        CFBundleDisplayName: Claude Usage
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
